{% extends 'base.html' %}

{% block title %}{{ product.title }}{% endblock %}

{% block content %}
<div class="container" style="margin-top: 80px; min-height: 600px;">

    <div style="margin-bottom: 20px;">
        <a href="{% url 'products' back_type %}" style="padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px;">
            ← 返回
        </a>
    </div>

    <div style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">
        {{ product.title }}
    </div>
    
    <div class="model-details">
        {% for img in product.productImgs.all %}
        <div class="row-4">
            <img class="img-responsive" src="{{img.photo.url}}" style="max-width: 100%; height: auto; max-height: 400px;">
        </div>
        {% endfor %}
        <h3>产品介绍</h3>
        <p>
            {{product.description|linebreaks}}
        </p>
        <h3>参考价格</h3>
        <p>
            {{product.price}}元
        </p>
    </div>
</div>
{% endblock %}
